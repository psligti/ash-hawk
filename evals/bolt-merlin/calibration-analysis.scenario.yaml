schema_version: "v1"
id: "bolt_merlin_calibration_analysis"
description: "Analyzes prediction accuracy, confidence distribution, and disagreement cases against actual outcomes"

sut:
  type: "agentic_sdk"
  adapter: "bolt_merlin"
  config:
    agent: "execution"

inputs:
  prompt: |
    You have access to a run artifact containing evaluation results.
    Perform a complete calibration analysis in three parts:

    PART 1: PREDICTION ACCURACY
    - Compare predicted scores against actual pass/fail outcomes
    - Identify overconfident predictions, underconfident predictions, well-calibrated ranges
    - Calculate ECE (Expected Calibration Error) and Brier score
    - Provide reliability analysis per score range

    PART 2: CONFIDENCE DISTRIBUTION
    - Analyze the distribution of confidence scores
    - Identify score clustering, confidence gaps, unusual distributions
    - Assess calibration per confidence band
    - Report distribution patterns and anomalies

    PART 3: DISAGREEMENT CASES
    - Identify all cases where predicted score significantly differs from actual outcome
    - Analyze prediction error magnitude, common patterns, root causes
    - Classify false positives vs false negatives
    - Assess threshold sensitivity for disagreement cases

    Use bash to list files and read to examine the run artifact data.
    End with a summary: "CALIBRATION SUMMARY: ECE=X.XXX, Brier=X.XXX, N disagreements"

tools:
  allowed_tools:
    - "bash"
    - "read"
  mocks:
    bash:
      input: {}
      result:
        stdout: "results/run_2024_01/scores.json\nresults/run_2024_01/transcripts/\nresults/run_2024_01/grades.json\n"
        stderr: ""
        exit_code: 0
    read:
      input: {}
      result:
        content: |
          {
            "run_id": "run_2024_01",
            "tasks": [
              {"id": "t1", "predicted": 0.85, "actual": 0.90, "passed": true},
              {"id": "t2", "predicted": 0.92, "actual": 0.45, "passed": false},
              {"id": "t3", "predicted": 0.70, "actual": 0.75, "passed": true},
              {"id": "t4", "predicted": 0.95, "actual": 0.88, "passed": true},
              {"id": "t5", "predicted": 0.60, "actual": 0.55, "passed": false},
              {"id": "t6", "predicted": 0.80, "actual": 0.82, "passed": true},
              {"id": "t7", "predicted": 0.90, "actual": 0.30, "passed": false},
              {"id": "t8", "predicted": 0.75, "actual": 0.78, "passed": true}
            ],
            "calibration": {"ece": 0.142, "brier": 0.089},
            "confidence_distribution": {
              "0.5-0.6": 1, "0.6-0.7": 1, "0.7-0.8": 2,
              "0.8-0.9": 2, "0.9-1.0": 2
            }
          }
  fault_injection: {}

budgets:
  max_steps: 40
  max_tool_calls: 30
  max_tokens: 8000
  max_time_seconds: 240.0

expectations:
  must_events:
    - "ToolCallEvent"
    - "ModelMessageEvent"
  must_not_events: []
  ordering_rules:
    - before: "ToolCallEvent"
      after: "ModelMessageEvent"
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "transcript_validity"
    required: true
    config: {}
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "trace_content"
    required: true
    config:
      required_event_types:
        - "ToolCallEvent"
        - "ModelMessageEvent"
      required_tool_calls:
        - tool: "bash"
          min_calls: 1
        - tool: "read"
          min_calls: 1
  - grader_type: "budget"
    required: true
    config:
      max_steps: 40
      max_tool_calls: 30
  - grader_type: "trace_quality"
    weight: 0.4
    config:
      target_tool_calls: 6
      tool_call_penalty: 0.08
      rejection_penalty: 0.1
      max_penalty: 0.4
      pass_threshold: 0.7
  - grader_type: "llm_judge"
    weight: 0.6
    config:
      rubric: |
        Score based on calibration analysis completeness:
        - 1.0: All three parts covered with ECE/Brier calculations and disagreement classification
        - 0.7: Two parts covered with quantitative analysis
        - 0.4: One part covered or only qualitative observations
        - 0.0: No meaningful calibration analysis
      model: glm-4-flash
  - grader_type: "summary_truthfulness"
    required: true
    config:
      summary_regex: "CALIBRATION SUMMARY:.*ECE=\\d+\\.\\d+.*Brier=\\d+\\.\\d+"
      strict_match: false
