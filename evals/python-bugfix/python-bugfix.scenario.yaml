schema_version: "v1"
id: python-bugfix-base
description: Minimal auto-research scenario focused on intent and grader-defined success

sut:
  type: "agentic_sdk"
  adapter: "dawn_kestrel"
  config:
    skill_path: ".dawn-kestrel/skills/python-bugfix.md"
    max_tokens: 2000
    max_time_seconds: 120

inputs:
  intent: |
    Repair Python bugfix behavior with minimal edits while preserving existing logic.
    Success is measured exclusively by grader outcomes.
  prompt: |
    Fix the bug in the provided Python code.

    The code is located at $solution_file.
    Tests are located at $test_file.

    Run the tests first to see the failure, then fix the bug with minimal changes.
    Ensure all tests pass after your fix.

graders:
  - grader_type: "test_runner"
    config:
      test_path: "./test_bug.py"
      pass_threshold: 1.0
      partial_credit: true
      timeout_seconds: 30
