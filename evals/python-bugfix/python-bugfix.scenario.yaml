schema_version: "v1"
id: python-bugfix-base
description: Base scenario for python bugfix tasks

sut:
  type: "dawn_kestrel"
  adapter: "dawn_kestrel"
  config:
    skill_path: ".dawn-kestrel/skills/python-bugfix.md"
    max_tokens: 2000
    max_time_seconds: 120

inputs:
  prompt: |
    Fix the bug in the provided Python code.
    
    The code is located at $solution_file.
    Tests are located at $test_file.
    
    Run the tests first to see the failure, then fix the bug with minimal changes.
    Ensure all tests pass after your fix.

  fixtures:
    solution_file: ./src/solution.py
    test_file: ./test_bug.py

tools:
  allowed_tools:
    - "bash"
    - "read"
    - "write"
    - "edit"
  mocks: {}
  fault_injection: {}

budget:
  max_steps: 5
  max_tool_calls: 10
  max_tokens: 2000
  max_time_seconds: 120.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "test_runner"
    config:
      test_path: "$test_file"
      pass_threshold: 1.0
      partial_credit: true
      timeout_seconds: 30
