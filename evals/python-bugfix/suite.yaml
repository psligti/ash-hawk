                timeout_seconds: 60
            - grader_type: diff_constraints
              config:
                max_loc: 10
                max_files: 1
            - grader_type: transcript
              config:
                max_tool_calls: 15
                partial_credit: true
    timeout_seconds: 300
    tags:
      - missing-return
      - functions

  - id: fix-wrong-operator
    description: Fix wrong operator (and vs or)
    input:
      prompt: |
        Fix the bug in the provided Python code.
        
        The code is located at $solution_file.
        Tests are located at $test_file.
        
        Run the tests first to see the failure, then fix the bug with minimal changes.
      fixtures:
        solution_file: ./03-wrong-operator/src/solution.py
