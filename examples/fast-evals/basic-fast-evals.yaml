id: fast-evals-basic-v1
name: Basic Fast Evals
description: Quick regression checks for narrow behaviors
parallelism: 4

defaults:
  grader_type: string_match
  pass_threshold: 0.7
  case_insensitive: true
  mode: contains

evals:
  - id: math-2-plus-2
    description: Verify simple arithmetic response
    input: What is 2 + 2?
    expected: "4"
    grader: string_match
    tags: [regression, deterministic]

  - id: polite-greeting
    description: Verify polite greeting behavior
    input: Say hello in one sentence.
    expected:
      - hello
      - hi
      - hey
    grader: string_match
    tags: [behavior, deterministic]

  - id: json-user-shape
    description: Verify JSON output shape
    input: Return JSON with fields name (string) and age (integer).
    grader: json_schema
    schema:
      type: object
      required: [name, age]
      properties:
        name:
          type: string
        age:
          type: integer
    tags: [format, deterministic]

  - id: concise-explanation-rubric
    description: Verify concise explanation quality with rubric
    input: Explain what recursion is in two sentences.
    grader:
      grader_type: llm_rubric
      pass_threshold: 0.7
      case_insensitive: false
      mode: exact
    rubric: |
      Score 1.0 if the response clearly defines recursion and mentions a base case.
      Score 0.7 if it defines recursion correctly but misses one key detail.
      Score 0.0 if incorrect or off-topic.
    tags: [quality, llm]
