schema_version: "v1"
id: "skills_tools_mcp_compliance"
description: "Compliance scenario: verify skill marker + MCP-prefixed tool usage constraints"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Load note-lark-memory skill, call note-lark MCP tools for memory lookup, and summarize the plan."
  expected_output: "Using note-lark-memory for scoped capture and note-lark MCP calls only."
  mock_tool_calls:
    - tool: "note-lark_memory_search"
      input:
        query: "user preference"
    - tool: "note-lark_notes_search"
      input:
        query: "memory workflow"

tools:
  allowed_tools:
    - "bash"
    - "note-lark_memory_search"
    - "note-lark_notes_search"
  mocks:
    bash:
      input:
        command: "echo 'mock'"
      result:
        stdout: "mock\n"
        stderr: ""
        exit_code: 0
    note-lark_memory_search:
      input:
        query: "user preference"
      result:
        items: []
    note-lark_notes_search:
      input:
        query: "memory workflow"
      result:
        items: []
  fault_injection: {}

budgets:
  max_steps: 20
  max_tool_calls: 8
  max_tokens: 500
  max_time_seconds: 30.0

expectations:
  must_events:
    - "ToolCallEvent"
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "budget"
    required: true
    config:
      max_steps: 20
      max_tool_calls: 8
      max_time_seconds: 30.0
  - grader_type: "trace_content"
    required: true
    config:
      required_event_types:
        - "ToolCallEvent"
      required_mcp_prefixes:
        - "note-lark_"
      required_skill_markers:
        - "note-lark-memory"
