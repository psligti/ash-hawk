schema_version: "v1"
id: "policy_plan_execute_progression"
description: "Plan-execute policy should progress through TODOs with bounded replanning"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Create a concise plan, work only on one TODO at a time, and avoid unnecessary replans."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
    - "bash"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 12
  max_tool_calls: 24
  max_tokens: 2500
  max_time_seconds: 150.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules:
    - before: "TodoEvent"
      after: "VerificationEvent"
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "ordering"
    required: false
    config:
      ordering_rules:
        - before: "TodoEvent"
          after: "VerificationEvent"
  - grader_type: "budget"
    required: true
    config:
      max_steps: 12
      max_tool_calls: 24
      max_time_seconds: 150.0
