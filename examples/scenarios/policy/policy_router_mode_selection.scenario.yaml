schema_version: "v1"
id: "policy_router_mode_selection"
description: "Router policy should route deterministically based on strictness and budget signals"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Pick the safest deterministic strategy and execute only one high-value action."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
    - "bash"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 10
  max_tool_calls: 18
  max_tokens: 1800
  max_time_seconds: 100.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "budget"
    required: true
    config:
      max_steps: 10
      max_tool_calls: 18
      max_time_seconds: 100.0
