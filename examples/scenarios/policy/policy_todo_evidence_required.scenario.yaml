schema_version: "v1"
id: "policy_todo_evidence_required"
description: "Completed TODO claims should include evidence references"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Track progress with TODOs and include evidence when marking items complete."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
    - "bash"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 12
  max_tool_calls: 20
  max_tokens: 2200
  max_time_seconds: 140.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "evidence_required"
    required: true
    config: {}
  - grader_type: "budget"
    required: true
    config:
      max_steps: 12
      max_tool_calls: 20
      max_time_seconds: 140.0
