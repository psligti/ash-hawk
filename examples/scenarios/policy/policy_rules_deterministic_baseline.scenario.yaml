schema_version: "v1"
id: "policy_rules_deterministic_baseline"
description: "Rules policy should produce stable bounded behavior for the same prompt"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "List a minimal plan and execute only the highest-priority safe step."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 8
  max_tool_calls: 16
  max_tokens: 1600
  max_time_seconds: 90.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "budget"
    required: true
    config:
      max_steps: 8
      max_tool_calls: 16
      max_time_seconds: 90.0
