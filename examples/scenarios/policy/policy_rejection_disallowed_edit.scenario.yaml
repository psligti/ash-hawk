schema_version: "v1"
id: "policy_rejection_disallowed_edit"
description: "Policy should reject edit attempts when edit-capable tools are not allowed"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Edit README.md and update project files immediately."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 8
  max_tool_calls: 12
  max_tokens: 1500
  max_time_seconds: 90.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules:
    - before: "PolicyDecisionEvent"
      after: "RejectionEvent"
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "ordering"
    required: false
    config:
      ordering_rules:
        - before: "PolicyDecisionEvent"
          after: "RejectionEvent"
  - grader_type: "budget"
    required: true
    config:
      max_steps: 8
      max_tool_calls: 12
      max_time_seconds: 90.0
