schema_version: "v1"
id: "policy_ordering_todo_verify_done"
description: "Enforce ordering invariants: TODO work before verification and completion"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Create a task list, execute one item, verify, then finalize."

tools:
  allowed_tools:
    - "read"
    - "glob"
    - "grep"
    - "bash"
  mocks: {}
  fault_injection: {}

budgets:
  max_steps: 10
  max_tool_calls: 18
  max_tokens: 1800
  max_time_seconds: 120.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules:
    - before: "TodoEvent"
      after: "VerificationEvent"
    - before: "VerificationEvent"
      after: "ModelMessageEvent"
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "ordering"
    required: true
    config:
      ordering_rules:
        - before: "TodoEvent"
          after: "VerificationEvent"
  - grader_type: "verify_before_done"
    required: true
    config: {}
