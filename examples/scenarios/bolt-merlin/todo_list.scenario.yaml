schema_version: "v1"
id: "bolt_merlin_todo_list"
description: "Tests bolt-merlin's todo list creation and tracking"

sut:
  type: "agentic_sdk"
  adapter: "bolt_merlin"
  config:
    agent: "execution"

inputs:
  prompt: |
    You have multiple tasks to complete:
    1. Fix the authentication bug in auth.py
    2. Add logging to the database connection
    3. Update the README with new API endpoints
    4. Clean up unused imports in utils.py
    
    Create a todo list, prioritize the tasks (bugs first), and work through them.
    Track completion of each task.

tools:
  allowed_tools:
    - "bash"
    - "read"
    - "write"
    - "edit"
    - "todo_create"
    - "todo_update"
  mocks:
    bash:
      input: {}
      result:
        stdout: "auth.py\ndb.py\nutils.py\nREADME.md\n"
        stderr: ""
        exit_code: 0
    read:
      input: {}
      result:
        content: "# file content\n"
    write:
      input: {}
      result:
        success: true
    edit:
      input: {}
      result:
        success: true
    todo_create:
      input: {}
      result:
        success: true
    todo_update:
      input: {}
      result:
        success: true
  fault_injection: {}

budgets:
  max_steps: 40
  max_tool_calls: 80
  max_tokens: 6000
  max_time_seconds: 180.0

expectations:
  must_events:
    - "ModelMessageEvent"
    - "ToolCallEvent"
  must_not_events: []
  ordering_rules:
    - before: "ModelMessageEvent"
      after: "ToolCallEvent"
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    config: {}
  - grader_type: "trace_content"
    config:
      required_event_types:
        - "ModelMessageEvent"
  - grader_type: "trace_quality"
    weight: 1.5
    config:
      target_tool_calls: 6
      tool_call_penalty: 0.08
      rejection_penalty: 0.12
      max_penalty: 0.6
      pass_threshold: 0.7
