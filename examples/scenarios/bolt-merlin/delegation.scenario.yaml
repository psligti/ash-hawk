schema_version: "v1"
id: "bolt_merlin_delegation"
description: "Tests bolt-merlin's ability to delegate to specialized subagents"

sut:
  type: "agentic_sdk"
  adapter: "bolt_merlin"
  config:
    agent: "execution"

inputs:
  prompt: |
    You need to understand how authentication works in this codebase.
    
    1. Find all authentication-related code (middleware, handlers, token logic)
    2. Find external documentation on JWT best practices
    
    Do NOT search manually. Delegate to the appropriate subagents.
    Your delegation prompts MUST include:
    - TASK: The specific goal
    - EXPECTED OUTCOME: What you expect back
    - MUST DO: Requirements
    - MUST NOT DO: Constraints

tools:
  allowed_tools:
    - "bash"
    - "read"
    - "task"
  mocks:
    bash:
      input: {}
      result:
        stdout: "src/auth/middleware.py\nsrc/auth/handlers.py\nsrc/auth/tokens.py"
        stderr: ""
        exit_code: 0
    read:
      input: {}
      result:
        content: "# auth code\n"
    task:
      input: {}
      result:
        status: "success"
        output: |
          Found authentication files:
          - src/auth/middleware.py - JWT validation middleware
          - src/auth/handlers.py - Login/logout endpoints
          - src/auth/tokens.py - Token generation and refresh
  fault_injection: {}

budgets:
  max_steps: 30
  max_tool_calls: 20
  max_tokens: 8000
  max_time_seconds: 180.0

expectations:
  must_events:
    - "ToolCallEvent"
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    required: true
    config: {}
  - grader_type: "trace_content"
    required: true
    config:
      required_event_types:
        - "ToolCallEvent"
      required_tool_calls:
        - tool: "task"
          min_calls: 1
  - grader_type: "ordering"
    required: true
    config:
      ordering_rules:
        - before: "ToolCallEvent"
          after: "ToolResultEvent"
  - grader_type: "trace_quality"
    weight: 0.5
    config:
      target_tool_calls: 4
      tool_call_penalty: 0.1
      rejection_penalty: 0.15
      max_penalty: 0.5
      pass_threshold: 0.7
  - grader_type: "prompt_stack_optimizer"
    weight: 0.5
    config:
      pass_threshold: 0.5
      max_growth_opportunities: 3
      max_mutation_targets: 2
