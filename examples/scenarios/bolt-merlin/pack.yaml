schema_version: "v1"
id: "bolt_merlin_pack"
description: "Scenario pack for bolt-merlin core capabilities"
target_agent: "bolt-merlin"

scenarios:
  - scenario: "./delegation.scenario.yaml"
    weight: 0.35
    focus:
      - "delegation"
      - "task_tool"
      - "prompt_structure"

  - scenario: "./goal_management.scenario.yaml"
    weight: 0.30
    focus:
      - "goal_tracking"
      - "progress_monitoring"
      - "task_completion"

  - scenario: "./policy_compliance.scenario.yaml"
    weight: 0.20
    focus:
      - "policy_compliance"
      - "explicit_verification"
      - "type_hints"

  - scenario: "./todo_management.scenario.yaml"
    weight: 0.15
    focus:
      - "todo_management"
      - "prioritization"
      - "state_tracking"

global_budgets:
  max_steps: 120
  max_tool_calls: 230
  max_tokens: 19000
  max_time_seconds: 600.0

pass_threshold: 0.75
