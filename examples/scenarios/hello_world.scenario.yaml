schema_version: "v1"
id: "hello_world"
description: "Minimal smoke test for agentic SDK with mock adapter"

sut:
  type: "agentic_sdk"
  adapter: "mock_adapter"
  config: {}

inputs:
  prompt: "Say hello world"

tools:
  allowed_tools:
    - "bash"
  mocks:
    bash:
      input:
        command: "echo hi"
      result:
        stdout: "hi\n"
        stderr: ""
        exit_code: 0
  fault_injection: {}

budgets:
  max_steps: 3
  max_tool_calls: 5
  max_tokens: 100
  max_time_seconds: 10.0

expectations:
  must_events: []
  must_not_events: []
  ordering_rules: []
  diff_assertions: []
  output_assertions: []

graders:
  - grader_type: "trace_schema"
    config: {}
